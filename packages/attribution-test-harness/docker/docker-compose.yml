version: '3.9'
services:
  publisher:
    build: { context: .., dockerfile: docker/Dockerfile.publisher }
    ports: ["8081:80"]
  mock-provider:
    build: { context: .., dockerfile: docker/Dockerfile.provider }
    ports: ["8082:3000"]
    environment:
      WEBHOOK_HMAC_SECRET: test-secret-do-not-use-in-prod
      PUBLISHER_URL: http://publisher
  runner:
    image: node:20-alpine
    working_dir: /app
    volumes: ["../:/app"]
    command: npm run test:e2e
    depends_on: [publisher, mock-provider]
